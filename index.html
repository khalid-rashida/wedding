<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>دعوة زفاف خالد ورشيدة</title>
<meta name="theme-color" content="#f5eee3">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#f5eee3}
main{width:min(900px,100%);margin:0 auto}
.section{position:relative;width:100%;line-height:0}
.section img{display:block;width:100%;height:auto}
.count-value{
  position:absolute;
  top:67.2%;
  width:12.1%;
  height:13.5%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#574562;
  font-family:Georgia,"Times New Roman",serif;
  font-size:clamp(30px,7.5vw,72px);
  font-weight:400;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
#days{left:15.3%}
#hours{left:35.0%}
#minutes{left:54.4%}
#seconds{left:73.7%}
.location-link{display:block;cursor:pointer}
.music-cover{position:relative}
.music-hotspot{
  position:absolute;
  top:0;
  right:0;
  width:34%;
  height:28%;
  border:0;
  padding:0;
  background:transparent;
  cursor:pointer;
  border-radius:0 0 0 50%;
  -webkit-tap-highlight-color:transparent;
}
.music-status{
  position:absolute;
  top:18px;
  right:18px;
  z-index:2;
  padding:9px 14px;
  border-radius:999px;
  border:1px solid rgba(201,166,95,.9);
  background:rgba(92,73,103,.82);
  color:#fff8e8;
  font-family:Tahoma,Arial,sans-serif;
  font-size:clamp(11px,2.2vw,16px);
  line-height:1.2;
  pointer-events:none;
  opacity:0;
  transform:translateY(-5px);
  transition:opacity .2s ease,transform .2s ease;
}
.music-cover.is-playing .music-status,
.music-cover.show-status .music-status{
  opacity:1;
  transform:none;
}
@media (max-width:500px){
  .count-value{font-size:clamp(24px,8vw,46px)}
}
</style>
<link rel="preload" href="cover.webp" as="image" type="image/webp">
</head>
<body>
<main>
  <section class="section music-cover" id="musicCover">
    <img src="cover.webp" alt="غلاف الدعوة" loading="eager" fetchpriority="high" decoding="async">
    <button class="music-hotspot" id="musicButton" type="button" aria-label="تشغيل أو إيقاف الموسيقى"></button>
    <span class="music-status" id="musicStatus">♫ الموسيقى تعمل</span>
    <audio id="weddingAudio" loop preload="none" src="music.m4a"></audio>
  </section>
  <section class="section"><img src="invitation.webp" loading="lazy" decoding="async" alt="بطاقة الدعوة"></section>

  <section class="section" aria-label="الوقت المتبقي على موعد الحفل">
    <img src="countdown.webp" loading="lazy" decoding="async" alt="العد التنازلي">
    <span class="count-value" id="days">00</span>
    <span class="count-value" id="hours">00</span>
    <span class="count-value" id="minutes">00</span>
    <span class="count-value" id="seconds">00</span>
  </section>

  <section class="section"><img src="details.webp" loading="lazy" decoding="async" alt="تفاصيل الحفل"></section>

  <a class="section location-link"
     href="https://www.google.com/maps/place/%D9%82%D8%A7%D8%B9%D8%A9+%D8%A7%D9%84%D8%AA%D9%87%D8%A7%D9%86%D9%8A/@21.4869585,39.2655722,21z/data=!4m6!3m5!1s0x15c3cdba65c27d3f:0x27df5ba96af72e32!8m2!3d21.4868952!4d39.2653586!16s%2Fg%2F11c1r1zmjv"
     target="_blank" rel="noopener"
     aria-label="فتح موقع قاعة التهاني في خرائط Google">
    <img src="location.webp" loading="lazy" decoding="async" alt="اضغط هنا لفتح موقع قاعة التهاني">
  </a>
</main>

<script>
const weddingAudio = document.getElementById("weddingAudio");
const musicButton = document.getElementById("musicButton");
const musicCover = document.getElementById("musicCover");
const musicStatus = document.getElementById("musicStatus");
weddingAudio.volume = 0.42;

function showMusicStatus(text) {
  musicStatus.textContent = text;
  musicCover.classList.add("show-status");
  clearTimeout(showMusicStatus.timer);
  showMusicStatus.timer = setTimeout(() => musicCover.classList.remove("show-status"), 1800);
}

musicButton.addEventListener("click", async () => {
  if (weddingAudio.paused) {
    try {
      await weddingAudio.play();
      musicCover.classList.add("is-playing");
      showMusicStatus("❚❚ اضغط على الأسطوانة لإيقاف الموسيقى");
    } catch (error) {
      showMusicStatus("تعذر تشغيل الموسيقى");
    }
  } else {
    weddingAudio.pause();
    musicCover.classList.remove("is-playing");
    showMusicStatus("♫ اضغط على الأسطوانة لتشغيل الموسيقى");
  }
});
</script>

<script>
const target = new Date("2026-08-11T21:00:00+03:00").getTime();
const ids = ["days","hours","minutes","seconds"];

function updateCountdown() {
  const remaining = Math.max(0, target - Date.now());
  const values = [
    Math.floor(remaining / 86400000),
    Math.floor((remaining % 86400000) / 3600000),
    Math.floor((remaining % 3600000) / 60000),
    Math.floor((remaining % 60000) / 1000)
  ];
  ids.forEach((id, index) => {
    document.getElementById(id).textContent = String(values[index]).padStart(2, "0");
  });
}
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
